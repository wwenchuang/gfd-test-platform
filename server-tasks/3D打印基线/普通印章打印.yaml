android:

tasks:
  - name: 普通印章打印
    # baseline.case_id: COM_KFB_MODEL_9d60338c7365
    # baseline.goal: 验证普通印章打印
    # baseline.start_page: App 首页
    # baseline.path: 趣味印章 -> 普通印章 -> 生成3D预览图 -> 去打印 -> 下一步 -> 返回
    # baseline.expected: 普通印章打印相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1500
      - launch: com.kfb.model
      - aiWaitFor: "App 首页已加载完成，首页中部功能入口横向列表可见，包含 AI建模、模型导入或可继续横向滑动的入口"
        timeout: 60000
      - aiAction: "首页遗留切片任务清理：如果当前首页顶部出现「模型处理完成」横幅，或横幅右侧出现「去打印」入口，则点击「去打印」进入「模型打印预览」；在预览页点击底部「取消打印」，弹出「确认要取消任务吗？」时点击「确定」，然后返回 App 首页。若首页没有该横幅/入口，则不要点击任何内容，直接继续。"
      - sleep: 1000
      - aiScroll: "首页中部建模功能横向 icon 列表区域，只在这个横向列表内滑动，不要滚动整个页面"
        scrollType: "singleAction"
        direction: "right"
        distance: 400
      - runAdbShell: "input swipe 950 1080 150 1080 500"
      - aiWaitFor: "首页中部功能入口横向列表中可见「趣味印章」入口"
        timeout: 30000
      - aiTap: "首页中部功能入口横向列表里的「趣味印章」卡片，不要点击底部导航中间的「AI建模」"
      - aiTap: "普通印章"
      - aiWaitFor: "普通印章编辑页已打开，能看到文字输入框"
        timeout: 60000
      - aiInput: "印章文字输入框"
        value: "UI自动化"
      - aiTap: "印章字体列表中间的字体选项"
      - aiTap: "生成3D预览图"
      - aiWaitFor: "3D 预览生成完成，页面出现可点击的「去打印」按钮"
        timeout: 240000
      - aiTap: "去打印"
      - aiWaitFor: "模型打印编辑界面已显示，底部出现可点击的「下一步」按钮"
        timeout: 240000
      - aiTap: "下一步"
      - ai: 如果页面出现“请确认耗材颜色”弹窗，则点击蓝色“确认”按钮；如果没有出现则不操作
      - aiWaitFor: "模型处理进度完成，页面出现可点击的「取消打印」按钮"
        timeout: 240000
      - aiTap: "取消打印"
      - ai: "如果出现确认取消或确定弹窗，点击确定；没有弹窗就跳过"
      - aiWaitFor: "已退出打印流程，页面出现返回按钮或回到模型详情相关页面"
        timeout: 60000
      - aiTap: "返回"
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1000
