android:

tasks:
  - name: 关节龙打印
    # baseline.case_id: COM_KFB_MODEL_f14f42c5f10b
    # baseline.goal: 验证关节龙打印
    # baseline.start_page: App 首页
    # baseline.path: 关节龙 -> 点击 去打印 按钮 -> 下一步 -> 点击 检查无误确认打印 按钮 -> 点击 返回首页 按钮
    # baseline.expected: 关节龙打印相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1500
      - launch: com.kfb.model
      - aiWaitFor: "App 首页已加载完成，右上角搜索入口或底部导航可见"
        timeout: 60000
      - aiAction: "首页遗留切片任务清理：如果当前首页顶部出现「模型处理完成」横幅，或横幅右侧出现「去打印」入口，则点击「去打印」进入「模型打印预览」；在预览页点击底部「取消打印」，弹出「确认要取消任务吗？」时点击「确定」，然后返回 App 首页。若首页没有该横幅/入口，则不要点击任何内容，直接继续。"
      - sleep: 1000
      - aiTap: "右上角放大镜搜索图标或搜索入口"
      - aiInput: "当前页面的搜索输入框或文本输入框"
        value: "关节龙"
      - aiKeyboardPress: "当前页面的搜索输入框或文本输入框"
        keyName: "Enter"
      - aiWaitFor: "搜索结果中出现「关节龙」模型"
        timeout: 60000
      - aiTap: "关节龙"
      - aiWaitFor: "关节龙模型详情页已打开，页面出现可点击的「去打印」按钮"
        timeout: 60000
      - aiTap: "点击 去打印 按钮"
      - aiWaitFor: "模型打印编辑界面已显示，底部出现可点击的「下一步」按钮"
        timeout: 240000
      - aiTap: "下一步"
      - aiWaitFor: "打印确认页已加载完成，页面出现可点击的「确认打印」按钮"
        timeout: 240000
      - aiTap: "确认打印"
      - aiWaitFor: "页面出现「检查无误确认打印」按钮"
        timeout: 60000
      - aiTap: "检查无误确认打印"
      - aiWaitFor: "打印任务已提交，页面出现「返回首页」按钮"
        timeout: 120000
      - aiTap: "点击 返回首页 按钮"
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1000
