android:

tasks:
  - name: 模型生成记录
    # baseline.case_id: COM_KFB_MODEL_a341e0b47085
    # baseline.goal: 验证模型生成记录
    # baseline.start_page: App 首页
    # baseline.path: 生成记录
    # baseline.expected: 模型生成记录相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1500
      - launch: com.kfb.model
      - aiWaitFor: "App 首页已加载完成，底部中间蓝色 3D icon 可见"
        timeout: 60000
      - aiAction: "首页遗留切片任务清理：如果当前首页顶部出现「模型处理完成」横幅，或横幅右侧出现「去打印」入口，则点击「去打印」进入「模型打印预览」；在预览页点击底部「取消打印」，弹出「确认要取消任务吗？」时点击「确定」，然后返回 App 首页。若首页没有该横幅/入口，则不要点击任何内容，直接继续。"
      - sleep: 1000
      - aiTap: "底部中间蓝色 3D icon"
      - sleep: 800
      - aiWaitFor: "建模功能弹窗或面板已打开，能看到「模型导入」「趣味印章」「文字建模」和底部/右下角「生成记录」入口"
        timeout: 60000
      - aiTap: "建模功能弹窗或面板底部的「生成记录」入口卡片/图标区域，不要点击「模型导入」「趣味印章」「文字建模」"
      - sleep: 800
      - aiWaitFor: "模型生成记录列表页已打开，能看到「生成记录」页面标题、记录列表或空状态"
        timeout: 60000
      - aiAssert: "当前页面是模型生成记录页面，且没有加载失败、网络错误或异常弹窗"
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1000
