android:

tasks:
  - name: 姓名牌打印
    # baseline.case_id: COM_KFB_MODEL_b245f8b77517
    # baseline.goal: 验证姓名牌打印
    # baseline.start_page: App 首页
    # baseline.path: 姓名牌 -> 去编辑 -> 生成模型 -> 去打印 -> 下一步 -> 返回
    # baseline.expected: 姓名牌打印相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1500
      - launch: com.kfb.model
      - aiWaitFor: "App 首页已加载完成，底部导航或可编辑模型 tab 可见"
        timeout: 60000
      - aiAction: "首页遗留切片任务清理：如果当前首页顶部出现「模型处理完成」横幅，或横幅右侧出现「去打印」入口，则点击「去打印」进入「模型打印预览」；在预览页点击底部「取消打印」，弹出「确认要取消任务吗？」时点击「确定」，然后返回 App 首页。若首页没有该横幅/入口，则不要点击任何内容，直接继续。"
      - sleep: 1000
      - ai: "点击可编辑模型tab即可，不要点击其他区域"
      - aiWaitFor: "可编辑模型列表页面已打开，能看到模型卡片列表"
        timeout: 60000
      - aiScroll: "可编辑模型列表区域，不要滚动顶部 tab 或底部导航"
        scrollType: "singleAction"
        direction: "down"
        distance: 450
        deepLocate: true
      - aiWaitFor: "可编辑模型列表中出现「姓名牌」模型卡片"
        timeout: 30000
      - aiTap: "「姓名牌」模型卡片"
      - aiWaitFor: "姓名牌详情页已打开，页面出现可点击的「去编辑」按钮"
        timeout: 60000
      - aiTap: "去编辑"
      - aiWaitFor: "姓名牌编辑页已打开，能看到文本输入框"
        timeout: 60000
      - aiInput: "姓名牌文本输入框"
        value: "UI自动化"
      - aiTap: "生成模型"
      - aiWaitFor: "模型生成完成，页面出现可点击的「去打印」按钮"
        timeout: 240000
      - aiTap: "去打印"
      - aiWaitFor: "模型打印编辑界面已显示，底部出现可点击的「下一步」按钮"
        timeout: 240000
      - aiTap: "下一步"
      - ai: 如果页面出现“请确认耗材颜色”弹窗，则点击蓝色“确认”按钮；如果没有出现则不操作
      - aiWaitFor: "模型处理进度完成，页面出现可点击的「取消打印」按钮"
        timeout: 240000
      - aiTap: "取消打印"
      - ai: "如果出现确认取消或确定弹窗，点击确定；没有弹窗就跳过"
      - aiWaitFor: "已退出打印流程，页面出现返回按钮或回到模型详情相关页面"
        timeout: 60000
      - aiTap: "返回"
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1000
