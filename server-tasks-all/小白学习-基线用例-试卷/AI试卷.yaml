android:
tasks:
  - name: 小白学习-AI试卷
    # baseline.case_id: COM_XBXXHZ_BOX_7df0f6879d32
    # baseline.goal: 验证小白学习-AI试卷
    # baseline.start_page: App 首页
    # baseline.path: 立即打印 按钮 -> 确认打印 按钮
    # baseline.expected: 小白学习-AI试卷相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "input keyevent 187"
      - sleep: 1000
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "am kill-all"
      - sleep: 500
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1500
      - launch: com.xbxxhz.box
      - sleep: 3000
      - sleep: 3000
      - ai: "打开之后如果有弹窗，请找到×并点击关闭；没有就跳过"
      - sleep: 3000
      - ai: "点击屏幕中间区域 名校试卷icon"
      - sleep: 3000
      - aiScroll: "试卷列表主要内容区域，不要滚动顶部栏或底部导航"
        scrollType: "singleAction"
        direction: "down"
        distance: 500
        deepLocate: true
      - aiWaitFor: "页面中出现试卷列表记录"
        timeout: 30000
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 60000
      - ai: "点击一份单元测试卷查看"
      - aiWaitFor: "页面加载完成，并且可以继续执行下一步：立即打印 按钮"
        timeout: 60000
      - aiTap: "立即打印 按钮"
      - sleep: 1000
      - aiTap: "确认打印 按钮"
      - sleep: 1000
      - aiAssert: "页面出现 任务传输中提示 或者有继续打印 按钮"
      - sleep: 1000
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
