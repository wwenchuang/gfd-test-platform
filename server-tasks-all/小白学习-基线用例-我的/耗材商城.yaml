        direction: "down"
        distance: 500
        deepLocate: true
      - aiWaitFor: "页面中出现「耗材特惠」入口或卡片"
        timeout: 30000
      - aiTap: "耗材特惠"
      - aiWaitFor: "页面加载完成，并且可以继续执行下一步：立即跳转"
        timeout: 60000
      - aiTap: "立即跳转"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 30000
      - ai: "小白智慧打印商城加载正常"
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
