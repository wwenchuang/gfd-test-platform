android:

tasks:
  - name: 试卷夹
    # baseline.goal: 验证试卷夹
    # baseline.start_page: App 首页
    # baseline.path: 我的 tab -> 试卷夹 icon -> 保存到试卷夹 -> 立即打印 -> 确认打印
    # baseline.expected: 试卷夹相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "input keyevent 187"
      - sleep: 1000
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "am kill-all"
      - sleep: 500
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1500
      - launch: com.xbxxhz.box
      - sleep: 3000
      - sleep: 3000
      - ai: "如果出现 您还未登录，请先登录提示，等待一下，没有就跳过"
      - sleep: 1000
      - ai: "打开之后如果有弹窗就找到x按钮点击关闭，没有弹窗就跳过"
      - sleep: 3000
      - aiTap: "我的 tab"
      - sleep: 2000
      - ai: "打开之后如果弹出弹窗点击关闭按钮，没有弹窗就跳过"
      - sleep: 1000
      - aiScroll: "我的页面主要内容区域，不要滚动顶部栏或底部导航"
        scrollType: "singleAction"
        direction: "down"
        distance: 450
        deepLocate: true
      - aiWaitFor: "我的页面中出现「我的学习」区域"
        timeout: 30000
      - sleep: 1000
      - aiWaitFor: "我的页面已加载完成，并且能看到「我的学习」区域"
        timeout: 60000

      - aiScroll: "我的学习下方的横向功能 icon 列表区域，只在这个横向列表内滑动，不要滚动整个页面"
        scrollType: "singleAction"
        direction: "right"
        distance: 180
        deepLocate: true

      - sleep: 800

      - aiWaitFor: "我的学习下方横向 icon 列表中可见「试卷夹」入口"
        timeout: 60000

      - aiTap: "我的学习下方的「试卷夹」icon"

      - sleep: 2000

      - aiTap: "试卷夹列表第一个试卷夹区域"

      - sleep: 3000
      - ai: "点击第一个试卷封面"
      - sleep: 3000
      - aiTap: "保存到试卷夹"
      - sleep: 2000
      - ai: "点击一次返回键"
      - sleep: 2000
      - aiWaitFor: "试卷预览页面加载完成，可见立即打印按钮"
        timeout: 60000
      - aiTap: "立即打印"
      - sleep: 3000
      - aiTap: "确认打印"
      - sleep: 1000
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
