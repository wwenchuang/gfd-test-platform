android:

tasks:
  - name: PDF转word
    # baseline.goal: 验证PDF转word
    # baseline.start_page: App 首页
    # baseline.path: 文档打印 icon -> PDF转Word icon -> 立即上传文件 -> 微信文档 -> 立即跳转 -> 上传文档 -> 文件传输助手 -> 确定
    # baseline.expected: PDF转word相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "input keyevent 187"
      - sleep: 1000
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "am kill-all"
      - sleep: 500
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1500
      - launch: com.xbxxhz.box
      - sleep: 3000
      - sleep: 3000
      - ai: "如果出现 您还未登录，请先登录提示，等待一下，没有就跳过"
      - sleep: 1000
      - ai: "打开之后如果有弹窗就找到x按钮点击关闭，没有弹窗就跳过"
      - sleep: 3000
      - aiTap: "文档打印 icon"
      - sleep: 1000
      - ai: "打开之后如果有弹窗就找到x按钮点击关闭，没有弹窗就跳过"
      - sleep: 3000
      - aiTap: "PDF转Word icon"
      - sleep: 1000
      - aiTap: "立即上传文件"
      - sleep: 1000
      - aiTap: "微信文档"
      - sleep: 1000
      - aiTap: "立即跳转"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 240000
      - ai: "如果有广告，点击跳过按钮，不要点击其他地方"
      - aiTap: "上传文档"
      - sleep: 1000
      - aiTap: "文件传输助手"
      - sleep: 1000
      - ai: "勾选一个PDF文件即可，不要点确定按钮"
      - sleep: 1000
      - aiTap: "确定"
      - aiWaitFor: "页面加载完成，并且可以继续执行下一步：确认导入"
        timeout: 240000
      - aiTap: "确认导入"
      - aiWaitFor: "页面加载完成，并且可以继续执行下一步：立即转换"
        timeout: 60000
      - aiTap: "立即转换"
      - aiWaitFor: "页面加载完成，并且可以继续执行下一步：导出"
        timeout: 60000
      - aiTap: "导出"
      - sleep: 1000
      - aiTap: "微信"
      - aiWaitFor: "页面加载完成，并且可以继续执行下一步：豆豆不熬夜"
        timeout: 60000
      - aiTap: "豆豆不熬夜"
      - sleep: 1000
      - aiTap: "发送"
      - aiAssert: "页面出现已发送提示"
      - sleep: 1000
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
