android:

tasks:
  - name: 文件扫描
    # baseline.goal: 验证文件扫描
    # baseline.start_page: App 首页
    # baseline.path: 扫描复印 icon -> 文件扫描 -> 相册导入 -> 完成 -> 预览并打印 -> 确定 -> 立即打印 -> 确认打印
    # baseline.expected: 文件扫描相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "input keyevent 187"
      - sleep: 1000
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "am kill-all"
      - sleep: 500
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1500
      - launch: com.xbxxhz.box
      - sleep: 3000
      - sleep: 3000
      - ai: "如果出现 您还未登录，请先登录提示，等待一下，没有就跳过"
      - sleep: 1000
      - ai: "打开之后如果有弹窗就找到x按钮点击关闭，没有弹窗就跳过"
      - sleep: 3000
      - aiTap: "扫描复印 icon"
      - sleep: 1000
      - aiTap: "文件扫描"
      - sleep: 1000
      - aiTap: "相册导入"
      - sleep: 1000
      - ai: "勾选一张照片即可，不要点击完成按钮"
      - sleep: 1000
      - aiTap: "完成"
      - aiWaitFor: "页面加载完成，并且可以继续执行下一步：预览并打印"
        timeout: 60000
      - aiTap: "预览并打印"
      - sleep: 1000
      - aiTap: "确定"
      - sleep: 1000
      - aiTap: "立即打印"
      - sleep: 1000
      - aiTap: "确认打印"
      - sleep: 1000
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
