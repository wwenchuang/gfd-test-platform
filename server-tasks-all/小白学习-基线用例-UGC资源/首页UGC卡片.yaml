    # baseline.goal: 验证首页UGC卡片
    # baseline.start_page: App 首页
    # baseline.path: 本地资料tab -> 立即打印 -> 确认打印
    # baseline.expected: 首页UGC卡片相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "input keyevent 187"
      - sleep: 1000
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "am kill-all"
      - sleep: 500
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1500
      - launch: com.xbxxhz.box
      - sleep: 3000
      - sleep: 3000
      - ai: "如果出现 您还未登录，请先登录提示，等待一下，没有就跳过"
      - sleep: 1000
      - ai: "打开之后如果有弹窗就找到x按钮点击关闭，没有弹窗就跳过"
      - sleep: 3000
      - aiScroll: "首页主要内容区域，不要滚动顶部栏或底部导航"
        scrollType: "singleAction"
        direction: "down"
        distance: 500
        deepLocate: true
      - aiWaitFor: "页面中出现精选资料卡片"
        timeout: 30000
      - aiTap: "本地资料tab"
      - ai: "点击南京市热门学校模块下第一个热门学校卡片"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 60000
      - ai: "点击一次返回按钮"
      - sleep: 1000
      - ai: "点击南京市真题试卷模块下任意一个资料封面"
      - aiWaitFor: "页面加载完成，并且可以继续执行下一步：立即打印"
        timeout: 60000
      - aiTap: "立即打印"
      - sleep: 2000
      - aiTap: "确认打印"
      - sleep: 1000
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
