      - aiTap: "备考提升icon"
      - sleep: 3000
      - aiTap: "月考tab"
      - sleep: 3000
      - ai: "点击资料列表中任意一份资料封面"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 30000
