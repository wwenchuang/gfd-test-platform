android:
tasks:
  - name: 随手打一份
    # baseline.case_id: COM_XBXXHZ_BOX_f31508e6cfe4
    # baseline.goal: 验证随手打一份
    # baseline.start_page: App 首页
    # baseline.path: 文档打印 icon -> 本地文档 icon -> 立即打印 -> 确认打印
    # baseline.expected: 随手打一份相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "input keyevent 187"
      - sleep: 1000
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "am kill-all"
      - sleep: 500
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1500
      - launch: com.xbxxhz.box
      - sleep: 3000
      - ai: "如果出现 您还未登录，请先登录提示，等待一下，没有就跳过"
      - sleep: 1000
      - ai: "如果有弹窗就找到x按钮点击关闭，没有弹窗就跳过"
      - sleep: 2000
      - aiTap: "文档打印icon"
      - sleep: 1000
      - ai: "如果有弹窗就点击弹窗底部关闭按钮，没有就跳过"
      - sleep: 1000
      - aiTap: "微信文档打印 icon"
      - sleep: 1000
      - aiTap: "立即跳转"
      - aiWaitFor: "出现上传文档或选择文件的入口"
        timeout: 240000
      - ai: "如果有广告或引导浮层，点击跳过或关闭按钮，不要点击其他地方"
      - aiTap: "上传文档"
      - sleep: 2000
      - aiTap: "文件传输助手绿色icon"
      - sleep: 1000
      - ai: "勾选一个文档类型的文件 PDF word 都可以"
      - sleep: 500
      - aiTap: "确定按钮"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 240000
      - ai: "确认导入 按钮变是黄色时 点击"
      - sleep: 3000
      - aiScroll: "当前页面主要内容区域，不要滚动顶部栏或底部导航"
        scrollType: "singleAction"
        direction: "down"
        distance: 500
        deepLocate: true
      - aiWaitFor: "页面中出现蓝色添加打印按钮"
        timeout: 30000
      - aiTap: "添加打印"
      - aiTap: "立即打印"
      - sleep: 3000
      - aiTap: "确认打印"
      - sleep: 1000
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
