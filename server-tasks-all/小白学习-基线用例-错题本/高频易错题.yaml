android:

tasks:
  - name: 高频易错题
    # baseline.goal: 验证高频易错题
    # baseline.start_page: App 首页
    # baseline.path: 错题本 icon -> 查看全部 -> 查看本地易错题 -> 一键组卷 -> 立即打印
    # baseline.expected: 高频易错题相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "input keyevent 187"
      - sleep: 1000
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input swipe 540 1900 540 350 300"
      - sleep: 500
      - runAdbShell: "input keyevent 3"
      - sleep: 500
      - runAdbShell: "am kill-all"
      - sleep: 500
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1500
      - launch: com.xbxxhz.box
      - sleep: 3000
      - sleep: 3000
      - ai: "如果出现 您还未登录，请先登录提示，等待一下，没有就跳过"
      - sleep: 1000
      - ai: "打开之后如果有弹窗就找到x按钮点击关闭，没有弹窗就跳过"
      - sleep: 3000
      - aiTap: "错题本 icon"
      - sleep: 2000
      - ai: "打开之后如果弹出弹窗点击关闭按钮，没有弹窗就跳过"
      - sleep: 1000
      - aiTap: "查看全部"
      - sleep: 1000
      - ai: "打开之后如果有弹窗就找到x按钮点击关闭，没有弹窗就跳过"
      - sleep: 1000
      - aiTap: "查看本地易错题"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 60000
      - ai: "点击第一个“搜相似题”按钮"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 60000
      - aiScroll: "题目列表区域，不要滚动顶部栏或底部导航"
        scrollType: "singleAction"
        direction: "down"
        distance: 450
        deepLocate: true
      - aiWaitFor: "页面中出现「查看答案和解析」按钮"
        timeout: 30000
      - aiTap: "第一个「查看答案和解析」按钮"
      - sleep: 2000
      - ai: "只要点击一次返回按钮"
      - sleep: 2000
      - ai: "返回之后如果弹出弹窗点击关闭按钮，没有弹窗就跳过"
      - sleep: 1000
      - aiScroll: "答案解析列表区域，不要滚动顶部栏或底部导航"
        scrollType: "singleAction"
        direction: "up"
        distance: 500
        deepLocate: true
      - aiWaitFor: "页面中出现「收起」按钮"
        timeout: 30000
      - aiTap: "收起按钮"
      - sleep: 2000
      - aiTap: "一键组卷"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 30000
      - aiWaitFor: "出现立即打印按钮"
        timeout: 30000
      - sleep: 2000
      - aiTap: "立即打印"
      - aiWaitFor: "页面加载完成且没有明显加载中状态"
        timeout: 60000
      - aiTap: 确认打印
      - aiWaitFor: "打印任务已提交或返回成功提示"
        timeout: 30000
      - sleep: 1000
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
