        timeout: 240000
      - ai: "点击“确认打印”按钮，如果找不到此按钮则点击“立即打印”按钮后等待8秒再点击“确认打印”按钮"
      - sleep: 1000
      - runAdbShell: "am force-stop com.xbxxhz.box"
      - sleep: 1000
