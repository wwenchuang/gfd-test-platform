android:

tasks:
  - name: "模型导入-微信导入"
    # baseline.case_id: COM_KFB_MODEL_0e27ae1d28a0
    # baseline.goal: 验证模型导入-微信导入
    # baseline.start_page: App 首页
    # baseline.path: 模型导入 -> 微信导入 -> 立即跳转 -> 导入模型 -> 文件传输助手 -> 勾选STL文件 -> 确定 -> 确认导入 -> 下一步 -> 返回
    # baseline.expected: 模型导入-微信导入相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1500
      - launch: com.kfb.model
      - aiWaitFor: "App 首页已加载完成，首页中部功能入口横向列表可见，包含 AI建模、模型导入或可继续横向滑动的入口"
        timeout: 60000
      - aiAction: "首页遗留切片任务清理：如果当前首页顶部出现「模型处理完成」横幅，或横幅右侧出现「去打印」入口，则点击「去打印」进入「模型打印预览」；在预览页点击底部「取消打印」，弹出「确认要取消任务吗？」时点击「确定」，然后返回 App 首页。若首页没有该横幅/入口，则不要点击任何内容，直接继续。"
      - sleep: 1000
      - aiTap: "首页中部功能入口横向列表里的「模型导入」卡片，不要点击底部导航中间的「AI建模」"
      - aiTap: "微信导入"
      - aiTap: "立即跳转"
      - aiWaitFor: "导入微信文件页面已打开，能看到「导入模型」入口"
        timeout: 60000
      - aiTap: "导入模型"
      - aiWaitFor: "微信文件列表或会话列表已打开，能看到「文件传输助手」"
        timeout: 60000
      - aiTap: "文件传输助手"
      - aiWaitFor: "文件传输助手文件列表已打开，能看到至少一个 .stl 文件，且文件条目左侧有空心圆形勾选框，底部有「确定」按钮"
        timeout: 60000
      - aiTap: "第一个 .stl 文件条目左侧的空心圆形勾选框；只点击勾选框，不点击文件名或文件详情区域"
      - aiWaitFor: "仍停留在文件传输助手文件列表页面，且第一个 .stl 文件左侧勾选框已选中，底部「确定」按钮可点击"
        timeout: 60000
      - aiTap: "底部右侧的「确定」按钮"
      - aiWaitFor: "文件导入进度完成，页面出现可点击的「确认导入」按钮"
        timeout: 240000
      - aiTap: "确认导入"
      - aiWaitFor: "模型导入完成，页面出现可点击的「下一步」按钮"
        timeout: 240000
      - aiTap: "底部蓝色「下一步」按钮"
      - ai: 如果页面出现“请确认耗材颜色”弹窗，则点击蓝色“确认”按钮；如果没有出现则不操作
      - aiWaitFor: "模型处理进度完成，页面出现可点击的「取消打印」按钮"
        timeout: 240000
      - aiTap: "取消打印"
      - sleep: 800
      - runAdbShell: "input tap 835 1480"
      - aiWaitFor: "已退出打印流程，页面出现返回按钮或回到模型导入相关页面"
        timeout: 60000
      - aiTap: "返回"
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1000
