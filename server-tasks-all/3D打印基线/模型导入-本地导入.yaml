android:

tasks:
  - name: "模型导入-本地导入"
    # baseline.case_id: COM_KFB_MODEL_6f389b0277e7
    # baseline.goal: 验证模型导入-本地导入
    # baseline.start_page: App 首页
    # baseline.path: 模型导入 -> 本地导入 -> 搜索按钮 （🔍） -> 下一步 -> 返回
    # baseline.expected: 模型导入-本地导入相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1500
      - launch: com.kfb.model
      - aiWaitFor: "App 首页已加载完成，底部中间蓝色 3D icon 可见"
        timeout: 60000
      - aiAction: "首页遗留切片任务清理：如果当前首页顶部出现「模型处理完成」横幅，或横幅右侧出现「去打印」入口，则点击「去打印」进入「模型打印预览」；在预览页点击底部「取消打印」，弹出「确认要取消任务吗？」时点击「确定」，然后返回 App 首页。若首页没有该横幅/入口，则不要点击任何内容，直接继续。"
      - sleep: 1000
      - aiTap: "底部中间蓝色 3D icon"
      - aiTap: "模型导入"
      - aiTap: "本地导入"
      - aiWaitFor: "本地导入文件选择页面已打开，右上角放大镜搜索图标可见"
        timeout: 60000
      - aiTap: "右上角放大镜搜索图标"
      - aiWaitFor: "文件选择器顶部搜索输入框已出现并可输入"
        timeout: 30000
      - aiTap: "文件选择器顶部搜索输入框"
      - aiInput: "文件选择器顶部搜索输入框"
        value: ".stl"
        autoDismissKeyboard: false
        mode: "replace"
      - aiKeyboardPress: "文件选择器顶部搜索输入框"
        keyName: "Enter"
      - aiWaitFor: "搜索结果列表中已出现 .stl 文件，列表第一条可见文件名包含「.stl」"
        timeout: 60000
      - aiTap: "搜索结果列表第一条 .stl 文件的文件名文字区域，例如「轮子链接.stl」；点击文件名或文件图标附近，不点击右侧四角/更多图标"
      - aiWaitFor: "已选中 .stl 文件，页面底部出现可点击的「下一步」按钮"
        timeout: 60000
      - aiTap: "底部蓝色「下一步」按钮"
      - aiWaitFor: "模型处理进度完成，页面出现可点击的「取消打印」按钮"
        timeout: 240000
      - aiTap: "取消打印"
      - sleep: 800
      - runAdbShell: "input tap 835 1480"
      - aiWaitFor: "已退出打印流程，页面出现返回按钮或回到模型导入相关页面"
        timeout: 60000
      - aiTap: "返回"
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1000
