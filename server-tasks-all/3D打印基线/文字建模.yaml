android:

tasks:
  - name: 文字建模
    # baseline.case_id: COM_KFB_MODEL_4f9e47eb53d2
    # baseline.goal: 验证文字建模
    # baseline.start_page: App 首页
    # baseline.path: 底部 AI建模 -> 开始创作 -> 输入描述 -> 没有喜欢的 -> 不补充直接生成 -> 去打印 -> 下一步 -> 返回
    # baseline.expected: 文字建模相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1500
      - launch: com.kfb.model
      - aiWaitFor: "App 首页已加载完成，底部中间「AI建模」入口和首页中部功能入口可见"
        timeout: 60000
      - aiAction: "首页遗留切片任务清理：如果当前首页顶部出现「模型处理完成」横幅，或横幅右侧出现「去打印」入口，则点击「去打印」进入「模型打印预览」；在预览页点击底部「取消打印」，弹出「确认要取消任务吗？」时点击「确定」，然后返回 App 首页。若首页没有该横幅/入口，则不要点击任何内容，直接继续。"
      - sleep: 1000
      - aiTap: "底部导航中间的「AI建模」入口"
      - aiWaitFor: "AI建模页已打开，能看到「开始创作」「图片建模」「语音创作」「大家都在做」或「我的作品」"
        timeout: 60000
      - aiTap: "AI建模页的「开始创作」入口"
      - aiWaitFor: "AI建模对话页已打开，能看到输入框、新对话或模型描述输入区"
        timeout: 60000
      - ai: "如果没有输入框，点击开启新对话；在输入框输入「UI自动化硬币图片」，不要点击其他按钮"
      - aiTap: "输入框右边纸飞机发送按钮"
      - aiWaitFor: "AI 返回参考图片结果，能看到候选图片、「没有喜欢的」按钮，或可继续生成模型的入口"
        timeout: 240000
      - aiAction: "如果看到「没有喜欢的」按钮，点击「没有喜欢的」；如果已经看到「不补充 直接生成」「生成模型」或模型生成中状态，则不要重复点击"
      - aiWaitFor: "页面出现「不补充 直接生成」「生成模型」按钮，或已经进入模型生成中状态"
        timeout: 60000
      - aiAction: "如果看到「不补充 直接生成」按钮，点击它；如果只看到「生成模型」按钮，点击「生成模型」；如果已经进入模型生成中状态，则不要操作"
      - aiWaitFor: "模型生成完成，页面出现可点击的「去打印」按钮"
        timeout: 240000
      - aiTap: "去打印"
      - aiWaitFor: "模型打印编辑界面已显示，底部出现可点击的「下一步」按钮"
        timeout: 240000
      - aiTap: "下一步"
      - ai: 如果页面出现“请确认耗材颜色”弹窗，则点击蓝色“确认”按钮；如果没有出现则不操作
      - aiWaitFor: "模型处理进度完成，页面出现可点击的「取消打印」按钮"
        timeout: 240000
      - aiTap: "取消打印"
      - ai: "如果出现确认取消或确定弹窗，点击确定；没有弹窗就跳过"
      - aiWaitFor: "已退出打印流程，页面出现返回按钮或回到模型详情相关页面"
        timeout: 60000
      - aiTap: "返回"
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1000
