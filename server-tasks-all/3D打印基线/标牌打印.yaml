android:

tasks:
  - name: 标牌打印
    # baseline.case_id: COM_KFB_MODEL_38708c2d47ee
    # baseline.goal: 验证标牌打印
    # baseline.start_page: App 首页
    # baseline.path: 标牌 -> 生成3D预览图 -> 去打印 -> 下一步 -> 返回
    # baseline.expected: 标牌打印相关页面结果符合预期
    # baseline.repair_hint: 优先参考当前 App 的页面知识库和基线辅助截图；如果入口文案变化，使用真实可见文案修复步骤和断言。
    flow:
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1500
      - launch: com.kfb.model
      - aiWaitFor: "App 首页已加载完成，底部中间蓝色 3D icon 可见"
        timeout: 60000
      - aiAction: "首页遗留切片任务清理：如果当前首页顶部出现「模型处理完成」横幅，或横幅右侧出现「去打印」入口，则点击「去打印」进入「模型打印预览」；在预览页点击底部「取消打印」，弹出「确认要取消任务吗？」时点击「确定」，然后返回 App 首页。若首页没有该横幅/入口，则不要点击任何内容，直接继续。"
      - sleep: 1000
      - aiTap: "底部中间蓝色 3D icon"
      - ai: "如果当前页面标题是「我的设备」或正在显示设备列表，点击返回回到 App 首页；否则不要操作"
      - aiWaitFor: "当前位于 3D 打印功能页，能看到「模型导入」「文字建模」「标牌」「趣味印章」等入口，且不是「我的设备」页面"
        timeout: 60000
      - aiTap: "3D 打印功能页里的「标牌」入口"
      - ai: "如果误进入「我的设备」页面，点击返回并重新进入 3D 打印功能页的「标牌」入口；如果已经进入标牌编辑页则不要操作"
      - aiWaitFor: "标牌编辑页已打开，能看到标牌文字输入框"
        timeout: 60000
      - aiInput: "标牌文字输入框"
        value: "UI自动化"
      - aiTap: "标牌字体列表中间的字体选项"
      - aiTap: "生成3D预览图"
      - aiWaitFor: "3D 预览生成完成，页面出现可点击的「去打印」按钮"
        timeout: 240000
      - aiTap: "去打印"
      - aiWaitFor: "模型打印编辑界面已显示，底部出现可点击的「下一步」按钮"
        timeout: 240000
      - aiTap: "下一步"
      - aiWaitFor: "模型处理进度完成，页面出现可点击的「取消打印」按钮"
        timeout: 240000
      - aiTap: "取消打印"
      - ai: "如果出现确认取消或确定弹窗，点击确定；没有弹窗就跳过"
      - aiWaitFor: "已退出打印流程，页面出现返回按钮或回到模型详情相关页面"
        timeout: 60000
      - aiTap: "返回"
      - runAdbShell: "am force-stop com.kfb.model"
      - sleep: 1000
